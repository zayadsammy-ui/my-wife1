<h2>ذكرياتنا ❤️</h2>

<input type="file" id="file"><br><br>
<input type="text" id="text" placeholder="اكتب ذكرى ❤️"><br><br>
<button onclick="addMemory()">إضافة</button>

<div id="gallery"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";
import { getDatabase, ref as dbRef, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

/* 🔥 Firebase Config (حطها هنا مرة واحدة بس) */
const firebaseConfig = {
  apiKey: "AIzaSyAyRvD-YkOILYvqEkaYQFW7khuGpGL1tBs",
  authDomain: "somaya-love.firebaseapp.com",
  projectId: "somaya-love",
  storageBucket: "somaya-love.firebasestorage.app",
  messagingSenderId: "100003980502",
  appId: "1:100003980502:web:7a63028e8d2f032f855577",
  measurementId: "G-C9GJVWW5WE"

/* Initialize */
 const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

/* ➤ إضافة ذكرى + صورة */
window.addMemory = async () => {

    const file = document.getElementById("file").files[0];
    const text = document.getElementById("text").value;

    let imageUrl = "";

    if(file){
        const storageRef = ref(storage, 'images/' + Date.now() + file.name);
        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
    }

    // حفظ في الداتابيز
    push(dbRef(db,"memories"),{
        text:text,
        image:imageUrl
    });

};

/* ➤ عرض مباشر (Realtime) */
onValue(dbRef(db,"memories"),(snapshot)=>{

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    snapshot.forEach((item)=>{

        let data = item.val();

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <p>${data.text || ""}</p>
            ${data.image ? `<img src="${data.image}">` : ""}
        `;

        gallery.prepend(card); // يظهر فورًا فوق

    });

});

</script>
